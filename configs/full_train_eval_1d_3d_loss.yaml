phase: 1
seed: 42
device: cuda

data:
  split: train
  max_len: 200
  max_len_valid: 200
  max_len_test: 4096
  subset_size_valid: 100
  subset_size_test: 1000
  use_sidechainnet_if_available: true
  dynamic_batching: true

model:
  vocab_size: 33
  d_model: 256
  nhead: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.1
  max_len: 4096
  head_hidden: 128
  d_pair: 128
  
  # ==========================================
  # Architectural Toggles (Driven by Factory)
  # ==========================================
  # block_type controls how the 1D Sequence and 2D Pair tracks interact:
  #   - 'two_track' (or 'full'): 2D biases 1D attention, AND 1D updates the 2D track via outer product.
  #   - 'pair_bias' (or 'pair_input'): 2D biases 1D attention, but 2D track is NOT updated (saves VRAM).
  #   - '1d' (or 'standard'): 2D track is ignored. Standard Transformer.
  block_type: 1d
  
  # head_mode controls how geometry and secondary structure (SS) are predicted:
  #   - 'direct': Predicts 5D geometry and 8-state SS in parallel from the 1D hidden state.
  #   - 'hierarchical_ss': Predicts SS first, then feeds SS probabilities into the geometry predictor.
  #   - 'hierarchical_ss_disto': Predicts SS first, then feeds SS *and* 2D Distogram context into geometry.
  head_mode: hierarchical_ss_disto
  
  # esm_mode controls the input embedding strategy:
  #   - 'unfreeze_last_n' (or 'partial'): Uses pre-trained ESM-2, unfreezing only the top N layers.
  #   - 'finetune' (or 'trainable'): Uses pre-trained ESM-2, unfreezing all 650M parameters.
  #   - 'learned' (or 'fresh_embedding'): Drops ESM-2 entirely; trains a simple nn.Embedding from scratch.
  esm_mode: unfreeze_last_n
  esm_unfreeze_last_n: 0
  
  # Inject the global 2D spatial awareness pool back into the final 1D sequence track before the head?
  pair_context_to_head: false

training:
  resume_from_checkpoint: true
  max_tokens: 3333
  accumulation_steps: 6
  megabatch_size: 10000
  lr: 5e-4
  min_lr_ratio: 0.001
  total_steps: 4000
  warmup_steps: 400
  decay_steps: 4000
  warmup_steps_3d: 400
  warmup_steps_band_mask: 400
  max_band_mask_size: 200
  logging_interval: 100
  checkpoint_interval: 500
  checkpoint_path: checkpoints/phase1_full_1d_3d_loss.pt
  compile: false

loss:
  lambda_distance: 1.0   
  lambda_3d: 0.02       
  lambda_ss: 0.1         
  lambda_disto: 1.0      
  use_3d_loss: true

inference:
  max_tokens: 5000
  checkpoint_path: checkpoints/phase1_full_1d_3d_loss.pt

postproc:
  use_nerf: true
  nerf_impl: mpnerf

export:
  output_dir: outputs/full_eval_1d_3d_loss
  pdb: true
  gltf: true
