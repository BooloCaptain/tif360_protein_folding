phase: 1
seed: 42
device: cuda

data:
  split: casp12
  max_len: 200
  use_sidechainnet_if_available: true
  dynamic_batching: true

model:
  vocab_size: 21
  d_model: 256
  nhead: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.1
  max_len: 200
  head_hidden: 128
  d_pair: 128

training:
  resume_from_checkpoint: true
  max_tokens: 500
  megabatch_size: 10000
  lr: 1e-4 # peak learning rate
  min_lr_ratio: 0.001
  total_steps: 250000
  warmup_steps: 10000
  decay_steps: 250000
  warmup_steps_3d: 10000
  warmup_steps_band_mask: 10000
  max_band_mask_size: 200
  checkpoint_interval: 1000
  checkpoint_path: checkpoints/phase1_full_mini.pt
  compile: false
  accumulation_steps: 40

loss:
  lambda_distance: 1.0   # Keep at 1.0
  lambda_3d: 0.0         # INCREASE from 0.01
  lambda_ss: 0.1         # DECREASE from 0.25
  lambda_disto: 1.0      # INCREASE from 0.05
  lambda_rog: 0.0        # Keep at 0.0

inference:
  max_tokens: 750
  checkpoint_path: checkpoints/phase1_full_mini.pt

postproc:
  use_nerf: true
  nerf_impl: mpnerf

export:
  output_dir: outputs/full_eval
  pdb: true
  gltf: true
