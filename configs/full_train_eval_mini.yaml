phase: 1
seed: 42
device: cuda

data:
  split: casp12
  max_len: 200
  use_sidechainnet_if_available: true
  dynamic_batching: true

model:
  vocab_size: 21
  d_model: 64
  nhead: 2
  num_layers: 2
  dim_feedforward: 256
  dropout: 0.1
  max_len: 2048
  head_hidden: 32

training:
  max_tokens: 25000
  megabatch_size: 10000
  lr: 3e-4             # This is now your PEAK learning rate
  steps: 20000          # Let it cook!
  warmup_steps: 2000   # Smoothly ramp up over the first ~4 epochs
  warmup_steps_3d: 4000 # New: Gradually increase 3D loss weight over first 10 epochs
  checkpoint_path: checkpoints/phase1_full_mini.pt
  compile: false

loss:
  lambda_distance: 1.0
  lambda_3d: 0.05

inference:
  num_samples: 64
  checkpoint_path: checkpoints/phase1_full.pt

postproc:
  use_nerf: true
  nerf_impl: mpnerf

export:
  output_dir: outputs/full_eval
  pdb: true
  gltf: true
