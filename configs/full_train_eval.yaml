phase: 1
seed: 42
device: cpu

data:
  split: casp12
  max_len: 1024
  use_sidechainnet_if_available: true
  dynamic_batching: true

model:
  vocab_size: 21
  d_model: 256
  nhead: 8
  num_layers: 8
  dim_feedforward: 1024
  dropout: 0.1
  max_len: 4096
  head_hidden: 256

training:
  batch_size: 16
  lr: 3e-4
  epochs: 10
  steps_per_epoch: 100
  checkpoint_path: checkpoints/phase1_full.pt

loss:
  lambda_distance: 0.5

inference:
  num_samples: 64
  checkpoint_path: checkpoints/phase1_full.pt

postproc:
  use_nerf: true
  nerf_impl: mpnerf

export:
  output_dir: outputs/full_eval
  pdb: true
  gltf: true
